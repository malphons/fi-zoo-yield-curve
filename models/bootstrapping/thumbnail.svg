<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="curveFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="120" rx="8" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="25" y1="95" x2="185" y2="95" stroke="#30363d" stroke-width="0.5"/>
  <line x1="25" y1="70" x2="185" y2="70" stroke="#30363d" stroke-width="0.5"/>
  <line x1="25" y1="45" x2="185" y2="45" stroke="#30363d" stroke-width="0.5"/>
  <line x1="25" y1="20" x2="185" y2="20" stroke="#30363d" stroke-width="0.5"/>
  <!-- Axis -->
  <line x1="25" y1="15" x2="25" y2="100" stroke="#30363d" stroke-width="1"/>
  <line x1="25" y1="100" x2="190" y2="100" stroke="#30363d" stroke-width="1"/>
  <!-- Fill under curve -->
  <path d="M30,85 Q55,78 75,70 Q100,58 130,48 Q155,38 180,32 L180,100 L30,100 Z" fill="url(#curveFill)"/>
  <!-- Yield curve line -->
  <path d="M30,85 Q55,78 75,70 Q100,58 130,48 Q155,38 180,32" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
  <!-- Bootstrapped data points with "strip" visual -->
  <g filter="url(#glow)">
    <!-- 1Y -->
    <circle cx="30" cy="85" r="4" fill="#58a6ff"/>
    <line x1="30" y1="85" x2="30" y2="100" stroke="#58a6ff" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
    <!-- 2Y -->
    <circle cx="55" cy="78" r="4" fill="#58a6ff"/>
    <line x1="55" y1="78" x2="55" y2="100" stroke="#58a6ff" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
    <!-- 3Y -->
    <circle cx="80" cy="68" r="4" fill="#58a6ff"/>
    <line x1="80" y1="68" x2="80" y2="100" stroke="#58a6ff" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
    <!-- 5Y -->
    <circle cx="115" cy="53" r="4" fill="#58a6ff"/>
    <line x1="115" y1="53" x2="115" y2="100" stroke="#58a6ff" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
    <!-- 7Y -->
    <circle cx="145" cy="43" r="4" fill="#58a6ff"/>
    <line x1="145" y1="43" x2="145" y2="100" stroke="#58a6ff" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
    <!-- 10Y -->
    <circle cx="180" cy="32" r="4" fill="#58a6ff"/>
    <line x1="180" y1="32" x2="180" y2="100" stroke="#58a6ff" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
  </g>
  <!-- Strip arrows (indicating extraction) -->
  <g opacity="0.6">
    <path d="M30,92 L30,88" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrowG)"/>
    <path d="M55,92 L55,81" stroke="#3fb950" stroke-width="1.5"/>
    <path d="M80,92 L80,71" stroke="#3fb950" stroke-width="1.5"/>
    <path d="M115,92 L115,56" stroke="#3fb950" stroke-width="1.5"/>
    <path d="M145,92 L145,46" stroke="#3fb950" stroke-width="1.5"/>
    <path d="M180,92 L180,35" stroke="#3fb950" stroke-width="1.5"/>
  </g>
  <!-- Small arrow markers -->
  <defs>
    <marker id="arrowG" markerWidth="6" markerHeight="4" refX="3" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#3fb950" opacity="0.6"/>
    </marker>
  </defs>
  <!-- Label -->
  <text x="100" y="113" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="8" font-weight="500">Bootstrapping</text>
</svg>
